<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Admin Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dde5;
      --text: #172033;
      --muted: #667085;
      --blue: #1f6feb;
      --green: #16825d;
      --amber: #9a6700;
      --red: #b42318;
      --ink: #24292f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      display: grid;
      grid-template-columns: 300px minmax(420px, 1fr) 380px;
      height: 100vh;
      overflow: hidden;
    }

    aside, main, .detail {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    main { background: #fbfcfe; }
    .detail { border-right: 0; }

    .workspace {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      overflow: hidden;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    h1, h2, h3 {
      margin: 0;
      letter-spacing: 0;
      line-height: 1.25;
    }

    h1 { font-size: 19px; }
    h2 { font-size: 15px; margin-bottom: 12px; }
    h3 { font-size: 14px; }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    label {
      display: grid;
      gap: 5px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--text);
      font: inherit;
      padding: 8px 10px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.45;
    }

    .chat-input {
      min-height: 52px;
      max-height: 160px;
      resize: vertical;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--blue);
      border-radius: 6px;
      background: var(--blue);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 650;
      padding: 0 12px;
    }

    button.secondary {
      border-color: var(--line);
      background: white;
      color: var(--text);
    }

    .run-list {
      display: grid;
      gap: 8px;
    }

    .run-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 6px;
      padding: 10px;
    }

    .run-item.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .session-group {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      overflow: hidden;
    }

    .session-head {
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: stretch;
      gap: 6px;
      padding: 8px;
    }

    .session-button {
      width: 100%;
      min-height: 0;
      text-align: left;
      border: 0;
      border-radius: 4px;
      background: white;
      color: var(--text);
      padding: 2px;
    }

    .session-button.active {
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .toggle-session {
      width: 28px;
      min-height: 28px;
      border-color: var(--line);
      background: white;
      color: var(--muted);
      padding: 0;
    }

    .session-runs {
      display: grid;
      gap: 6px;
      padding: 0 8px 8px 18px;
      border-top: 1px solid #eef1f5;
    }

    .session-runs .run-item {
      border-radius: 5px;
      padding: 8px;
      font-size: 13px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.running { border-color: #8bb9ff; color: var(--blue); }
    .badge.completed { border-color: #7bc6a4; color: var(--green); }
    .badge.failed, .badge.blocked { border-color: #f0a7a0; color: var(--red); }
    .badge.waiting_approval { border-color: #e7c46b; color: var(--amber); }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .conversation {
      overflow: auto;
      min-height: 0;
      padding: 16px;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 12px;
    }

    .message {
      max-width: 780px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 12px;
    }

    .message.user {
      margin-left: auto;
      border-color: #b8d3ff;
      background: #eef5ff;
    }

    .message.assistant {
      margin-right: auto;
    }

    pre {
      margin: 8px 0 0;
      max-height: 260px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #f7f8fa;
      color: var(--ink);
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 10px;
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      aside, main, .detail {
        height: auto;
        overflow: visible;
        border-right: 0;
      }

      .workspace {
        min-height: 70vh;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="section">
        <div class="row">
          <h1>Agent Runs</h1>
          <button id="refreshBtn" class="secondary" type="button">刷新</button>
        </div>
      </div>
      <div class="section">
        <h2>运行设置</h2>
        <label>
          自主等级
          <select id="autonomy">
            <option value="medium">medium</option>
            <option value="low">low</option>
            <option value="high">high</option>
          </select>
        </label>
        <label>
          Workspace Scope
          <input id="workspaceScope" value=".">
        </label>
      </div>
      <div class="section">
        <h2>Run 列表</h2>
        <div id="runList" class="run-list"></div>
      </div>
    </aside>

    <main class="workspace">
      <div class="section">
        <div class="row">
          <div>
            <h1 id="selectedTitle">新对话</h1>
            <div id="selectedMeta" class="muted"></div>
          </div>
          <div class="row">
            <button id="newChatBtn" class="secondary" type="button">新对话</button>
            <span id="selectedStatus" class="badge">idle</span>
          </div>
        </div>
      </div>
      <div class="conversation">
        <div id="timeline" class="timeline">
          <div class="empty">输入消息开始多轮对话</div>
        </div>
      </div>
      <form id="chatForm" class="composer">
        <textarea id="chatInput" class="chat-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行" required></textarea>
        <button id="sendBtn" type="submit">发送</button>
      </form>
    </main>

    <section class="detail">
      <div class="section">
        <h2>Run 配置</h2>
        <div id="runConfig" class="kv"></div>
      </div>
      <div class="section">
        <h2>工具执行结果</h2>
        <div id="toolCalls" class="timeline"></div>
      </div>
      <div class="section">
        <h2>审计事件</h2>
        <div id="auditEvents" class="timeline"></div>
      </div>
    </section>
  </div>

  <script>
    const runListEl = document.getElementById("runList");
    const timelineEl = document.getElementById("timeline");
    const toolCallsEl = document.getElementById("toolCalls");
    const auditEventsEl = document.getElementById("auditEvents");
    const runConfigEl = document.getElementById("runConfig");
    const selectedTitleEl = document.getElementById("selectedTitle");
    const selectedMetaEl = document.getElementById("selectedMeta");
    const selectedStatusEl = document.getElementById("selectedStatus");
    const chatFormEl = document.getElementById("chatForm");
    const chatInputEl = document.getElementById("chatInput");
    const sendBtnEl = document.getElementById("sendBtn");
    const refreshBtnEl = document.getElementById("refreshBtn");
    const newChatBtnEl = document.getElementById("newChatBtn");

    let selectedRunId = "";
    let selectedSessionId = "";
    let autoSelectLatest = true;
    let currentRuns = [];
    const collapsedSessions = new Set();
    let eventSource = null;

    async function requestJSON(url, options) {
      const res = await fetch(url, options);
      if (!res.ok) {
        throw new Error(await res.text());
      }
      return res.json();
    }

    async function loadRuns() {
      const data = await requestJSON("/api/runs");
      currentRuns = data.runs || [];
      renderRuns(currentRuns);
      if (autoSelectLatest && !selectedRunId && currentRuns.length > 0) {
        await selectRun(currentRuns[0].id);
      }
    }

    function renderRuns(runs) {
      runListEl.innerHTML = "";
      if (runs.length === 0) {
        runListEl.innerHTML = '<div class="empty">暂无 run</div>';
        return;
      }
      for (const session of groupRunsBySession(runs)) {
        const group = document.createElement("div");
        group.className = "session-group";
        const isCollapsed = collapsedSessions.has(session.id);

        const sessionButton = document.createElement("button");
        sessionButton.type = "button";
        sessionButton.className = "session-button" + (session.id === selectedSessionId ? " active" : "");
        sessionButton.innerHTML = `
          <div class="row">
            <strong>${escapeHTML(session.title)}</strong>
            <span class="badge ${session.latest.status}">${escapeHTML(session.latest.status)}</span>
          </div>
          <div class="muted">${session.runs.length} runs · ${new Date(session.latest.updated_at).toLocaleString()}</div>
        `;
        sessionButton.addEventListener("click", () => selectRun(session.latest.id));

        const toggleButton = document.createElement("button");
        toggleButton.className = "toggle-session";
        toggleButton.type = "button";
        toggleButton.setAttribute("aria-label", isCollapsed ? "展开对话" : "收起对话");
        toggleButton.setAttribute("aria-expanded", String(!isCollapsed));
        toggleButton.textContent = isCollapsed ? "▸" : "▾";
        toggleButton.addEventListener("click", () => toggleSession(session.id));

        const head = document.createElement("div");
        head.className = "session-head";
        head.appendChild(toggleButton);
        head.appendChild(sessionButton);
        group.appendChild(head);

        if (!isCollapsed) {
          const runItems = document.createElement("div");
          runItems.className = "session-runs";
          for (const run of session.runs) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "run-item" + (run.id === selectedRunId ? " active" : "");
            button.innerHTML = `
              <div class="row">
                <span>${escapeHTML(shortText(run.goal, 34))}</span>
                <span class="badge ${run.status}">${escapeHTML(run.status)}</span>
              </div>
              <div class="muted">${new Date(run.created_at).toLocaleString()}</div>
            `;
            button.addEventListener("click", () => selectRun(run.id));
            runItems.appendChild(button);
          }
          group.appendChild(runItems);
        }
        runListEl.appendChild(group);
      }
    }

    function toggleSession(sessionId) {
      if (collapsedSessions.has(sessionId)) {
        collapsedSessions.delete(sessionId);
      } else {
        collapsedSessions.add(sessionId);
      }
      renderRuns(currentRuns);
    }

    function groupRunsBySession(runs) {
      const sessions = new Map();
      for (const run of runs) {
        const sessionId = run.session_id || run.id;
        if (!sessions.has(sessionId)) {
          sessions.set(sessionId, { id: sessionId, runs: [] });
        }
        sessions.get(sessionId).runs.push(run);
      }
      return [...sessions.values()].map((session) => {
        session.runs.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        session.latest = [...session.runs].sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
        session.title = session.runs[0]?.goal || "未命名对话";
        return session;
      }).sort((a, b) => new Date(b.latest.updated_at) - new Date(a.latest.updated_at));
    }

    async function selectRun(runId) {
      selectedRunId = runId;
      autoSelectLatest = true;
      if (eventSource) {
        eventSource.close();
      }
      await loadSnapshot(runId);
      eventSource = new EventSource(`/api/runs/${runId}/events`);
      eventSource.onmessage = () => loadSnapshot(runId).then(loadRuns);
    }

    async function loadSnapshot(runId) {
      const snapshot = await requestJSON(`/api/runs/${runId}`);
      renderSnapshot(snapshot);
      if (snapshot.run && snapshot.run.session_id) {
        await loadSession(snapshot.run.session_id);
      }
    }

    async function loadSession(sessionId) {
      const snapshot = await requestJSON(`/api/sessions/${sessionId}`);
      selectedSessionId = snapshot.session_id;
      renderSession(snapshot);
    }

    function renderSnapshot(snapshot) {
      const run = snapshot.run;
      selectedSessionId = run.session_id;
      selectedTitleEl.textContent = run.goal;
      selectedMetaEl.textContent = `session ${run.session_id} · run ${run.id} · ${new Date(run.created_at).toLocaleString()}`;
      selectedStatusEl.textContent = run.status;
      selectedStatusEl.className = `badge ${run.status}`;

      runConfigEl.innerHTML = `
        <div>Autonomy</div><div>${escapeHTML(run.autonomy_level)}</div>
        <div>Tools</div><div>${escapeHTML((run.enabled_tools || []).join(", ") || "none")}</div>
        <div>Scope</div><div>${escapeHTML(run.workspace_scope)}</div>
        <div>Owner</div><div>${escapeHTML(run.owner_id)}</div>
        <div>Session</div><div>${escapeHTML(run.session_id)}</div>
      `;

      renderToolCalls(snapshot.tool_calls || []);
      renderAudit(snapshot.audit_events || []);
    }

    function renderSession(snapshot) {
      timelineEl.innerHTML = "";
      const runs = snapshot.runs || [];
      if (runs.length === 0) {
        timelineEl.innerHTML = '<div class="empty">输入消息开始多轮对话</div>';
        return;
      }
      for (const item of runs) {
        const run = item.run;
        const user = document.createElement("div");
        user.className = "message user";
        user.textContent = run.goal;
        timelineEl.appendChild(user);

        const answer = latestResponse(item.steps || []);
        if (answer) {
          const assistant = document.createElement("div");
          assistant.className = "message assistant";
          assistant.innerHTML = `
            <div class="row">
              <h3>assistant</h3>
              <span class="badge ${run.status}">${escapeHTML(run.status)}</span>
            </div>
            ${answer.reasoning_summary ? `<p class="muted">${escapeHTML(answer.reasoning_summary)}</p>` : ""}
            <pre>${escapeHTML(formatMaybeJSON(answer.model_output))}</pre>
          `;
          timelineEl.appendChild(assistant);
        } else {
          const pending = document.createElement("div");
          pending.className = "message assistant";
          pending.innerHTML = `
            <div class="row">
              <h3>assistant</h3>
              <span class="badge ${run.status}">${escapeHTML(run.status)}</span>
            </div>
            <p class="muted">等待 AI 回复</p>
          `;
          timelineEl.appendChild(pending);
        }
      }
      timelineEl.scrollIntoView({ block: "end" });
    }

    function latestResponse(steps) {
      for (let i = steps.length - 1; i >= 0; i -= 1) {
        if (steps[i].type === "response" && steps[i].model_output) {
          return steps[i];
        }
      }
      return null;
    }

    function renderToolCalls(calls) {
      toolCallsEl.innerHTML = "";
      if (calls.length === 0) {
        toolCallsEl.innerHTML = '<div class="empty">暂无工具调用</div>';
        return;
      }
      for (const call of calls) {
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="row">
            <h3>${escapeHTML(call.tool_name)}</h3>
            <span class="badge">${escapeHTML(call.policy_decision)}</span>
          </div>
          <div class="muted">${escapeHTML(call.risk_level)} · ${escapeHTML(call.status)}</div>
          <pre>${escapeHTML(formatMaybeJSON(call.arguments_json))}</pre>
          <pre>${escapeHTML(formatMaybeJSON(call.result_json || call.error || ""))}</pre>
        `;
        toolCallsEl.appendChild(item);
      }
    }

    function renderAudit(events) {
      auditEventsEl.innerHTML = "";
      if (events.length === 0) {
        auditEventsEl.innerHTML = '<div class="empty">暂无审计事件</div>';
        return;
      }
      for (const event of events) {
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="row">
            <h3>${escapeHTML(event.action)}</h3>
            <span class="badge">${escapeHTML(event.actor)}</span>
          </div>
          <div class="muted">${new Date(event.created_at).toLocaleString()}</div>
          <pre>${escapeHTML(formatMaybeJSON(event.payload_json))}</pre>
        `;
        auditEventsEl.appendChild(item);
      }
    }

    function formatMaybeJSON(value) {
      try {
        return JSON.stringify(JSON.parse(value), null, 2);
      } catch {
        return value;
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function shortText(value, length) {
      const text = String(value || "");
      return text.length > length ? text.slice(0, length - 1) + "…" : text;
    }

    chatFormEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const content = chatInputEl.value.trim();
      if (!content || sendBtnEl.disabled) {
        return;
      }
      sendBtnEl.disabled = true;
      const run = await requestJSON("/api/runs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          goal: content,
          session_id: selectedSessionId || "",
          autonomy_level: document.getElementById("autonomy").value,
          workspace_scope: document.getElementById("workspaceScope").value.trim() || ".",
          enabled_tools: []
        })
      }).finally(() => {
        sendBtnEl.disabled = false;
      });
      chatInputEl.value = "";
      await selectRun(run.id);
      await loadRuns();
    });

    function resetConversation() {
      selectedRunId = "";
      selectedSessionId = "";
      autoSelectLatest = false;
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      selectedTitleEl.textContent = "新对话";
      selectedMetaEl.textContent = "";
      selectedStatusEl.textContent = "idle";
      selectedStatusEl.className = "badge";
      runConfigEl.innerHTML = "";
      toolCallsEl.innerHTML = '<div class="empty">暂无工具调用</div>';
      auditEventsEl.innerHTML = '<div class="empty">暂无审计事件</div>';
      timelineEl.innerHTML = '<div class="empty">输入消息开始多轮对话</div>';
      renderRuns(currentRuns);
      chatInputEl.focus();
    }

    chatInputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatFormEl.requestSubmit();
      }
    });

    refreshBtnEl.addEventListener("click", loadRuns);
    newChatBtnEl.addEventListener("click", resetConversation);
    loadRuns();
    chatInputEl.focus();
  </script>
</body>
</html>
