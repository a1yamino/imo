<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenAI 兼容多轮对话</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #657184;
      --accent: #1769e0;
      --accent-dark: #1056ba;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 920px;
      margin: 0 auto;
      padding: 18px;
      gap: 12px;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      min-height: 40px;
      padding: 0 14px;
    }

    button:hover {
      border-color: #aeb9c8;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
      min-width: 84px;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 0 10px;
    }

    .model-select {
      min-width: 220px;
      max-width: 320px;
    }

    .chat {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      min-height: 0;
    }

    .empty {
      height: 100%;
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .message {
      display: flex;
      margin: 0 0 14px;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      flex-direction: column;
      align-items: flex-start;
    }

    .bubble {
      max-width: min(680px, 86%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f9fbfe;
    }

    .user .bubble {
      border-color: #b9d3ff;
      background: #eaf2ff;
    }

    .assistant .bubble {
      background: #ffffff;
    }

    .reasoning {
      max-width: min(680px, 86%);
      margin-bottom: 8px;
      border: 1px solid #d7c98f;
      border-radius: 8px;
      background: #fff9df;
      color: #4f461c;
    }

    .reasoning summary {
      cursor: pointer;
      padding: 8px 10px;
      font-weight: 650;
    }

    .reasoning-body {
      border-top: 1px solid #eadc9d;
      padding: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.6;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      flex-shrink: 0;
    }

    textarea {
      width: 100%;
      min-height: 68px;
      max-height: 220px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font: inherit;
      line-height: 1.5;
      color: var(--text);
      background: var(--panel);
    }

    textarea:focus {
      outline: 2px solid rgba(23, 105, 224, 0.18);
      border-color: var(--accent);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .chat {
        min-height: 360px;
        padding: 12px;
      }

      .bubble {
        max-width: 94%;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button.primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>OpenAI 兼容多轮对话</h1>
      <div class="toolbar">
        <label>
          模型
          <select id="modelSelect" class="model-select">
            <option value="">加载中...</option>
          </select>
        </label>
        <label>
          思考强度
          <select id="reasoningEffort">
            <option value="">不传</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </label>
        <button id="clearBtn" type="button">清空上下文</button>
      </div>
    </header>

    <section id="chat" class="chat" aria-live="polite">
      <div class="empty">输入第一条消息开始对话。<br>上下文保存在当前浏览器页面中。</div>
    </section>

    <form id="form" class="composer">
      <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
      <button id="sendBtn" class="primary" type="submit">发送</button>
      <div id="status" class="status"></div>
    </form>
  </main>

  <script>
    const chatEl = document.getElementById("chat");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const modelSelectEl = document.getElementById("modelSelect");
    const reasoningEffortEl = document.getElementById("reasoningEffort");
    const statusEl = document.getElementById("status");
    const messages = [];

    function setStatus(text, isError) {
      statusEl.textContent = text || "";
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function render() {
      chatEl.innerHTML = "";
      if (messages.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "输入第一条消息开始对话。<br>上下文保存在当前浏览器页面中。";
        chatEl.appendChild(empty);
        return;
      }

      for (const msg of messages) {
        const row = document.createElement("div");
        row.className = "message " + msg.role;

        const reasoning = msg.reasoning_content || msg.reasoningContent;
        if (msg.role === "assistant" && reasoning) {
          const details = document.createElement("details");
          details.className = "reasoning";
          details.open = true;

          const summary = document.createElement("summary");
          summary.textContent = "Reasoning";

          const body = document.createElement("div");
          body.className = "reasoning-body";
          body.textContent = reasoning;

          details.appendChild(summary);
          details.appendChild(body);
          row.appendChild(details);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = msg.content;

        row.appendChild(bubble);
        chatEl.appendChild(row);
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendMessage(content) {
      messages.push({ role: "user", content });
      render();
      setStatus("生成中...");
      sendBtn.disabled = true;
      inputEl.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            model: modelSelectEl.value,
            reasoning_effort: reasoningEffortEl.value
          })
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const assistant = { role: "assistant", content: "", reasoning_content: "" };
        messages.push(assistant);
        render();

        await readEventStream(res, (event) => {
          if (event.type === "content_delta") {
            assistant.content += event.delta || "";
            render();
            return;
          }
          if (event.type === "reasoning_delta") {
            assistant.reasoning_content += event.delta || "";
            render();
            return;
          }
          if (event.type === "error") {
            throw new Error(event.message || "stream error");
          }
        });

        setStatus("");
      } catch (err) {
        const last = messages[messages.length - 1];
        if (last && last.role === "assistant") {
          messages.pop();
        }
        messages.pop();
        render();
        setStatus("请求失败：" + err.message.trim(), true);
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    async function loadModels() {
      try {
        const res = await fetch("/api/models");
        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();
        fillModelSelect(data.default_model, data.models || []);
        setStatus("");
      } catch (err) {
        modelSelectEl.innerHTML = "";
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "使用默认模型";
        modelSelectEl.appendChild(option);
        setStatus("模型列表加载失败，将使用默认模型：" + err.message.trim(), true);
      }
    }

    function fillModelSelect(defaultModel, models) {
      const uniqueModels = Array.from(new Set([defaultModel, ...models].filter(Boolean)));
      modelSelectEl.innerHTML = "";

      for (const model of uniqueModels) {
        const option = document.createElement("option");
        option.value = model;
        option.textContent = model === defaultModel ? model + "（默认）" : model;
        modelSelectEl.appendChild(option);
      }

      if (defaultModel) {
        modelSelectEl.value = defaultModel;
      }
    }

    async function readEventStream(res, onEvent) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) {
          break;
        }

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop() || "";

        for (const rawEvent of events) {
          for (const line of rawEvent.split("\n")) {
            if (!line.startsWith("data:")) {
              continue;
            }

            const data = line.slice(5).trim();
            if (!data) {
              continue;
            }

            onEvent(JSON.parse(data));
          }
        }
      }

      buffer += decoder.decode();
      if (buffer.trim()) {
        for (const line of buffer.split("\n")) {
          if (line.startsWith("data:")) {
            onEvent(JSON.parse(line.slice(5).trim()));
          }
        }
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const content = inputEl.value.trim();
      if (!content || sendBtn.disabled) {
        return;
      }
      inputEl.value = "";
      sendMessage(content);
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        formEl.requestSubmit();
      }
    });

    clearBtn.addEventListener("click", () => {
      messages.length = 0;
      setStatus("");
      render();
      inputEl.focus();
    });

    render();
    loadModels();
    inputEl.focus();
  </script>
</body>
</html>
